services:
  traefik:
    image: traefik:v2.10
    container_name: prism-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml"
    networks:
      - prism-network

  db:
    image: postgres:15-alpine
    container_name: prism-db
    environment:
      POSTGRES_USER: prism_user
      POSTGRES_PASSWORD: prism_password
      POSTGRES_DB: prism_journal
    ports:
      - "5432:5432"
    volumes:
      - prism_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism_user -d prism_journal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prism-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://prism_user:prism_password@db:5432/prism_journal"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://prism.we-share.nl}"
      NEBUL_API_KEY: "${NEBUL_API_KEY}"
      NEBUL_BASE_URL: "${NEBUL_BASE_URL:-https://api.inference.nebul.io/v1}"
      NEBUL_MODEL: "${NEBUL_MODEL:-Qwen/Qwen3.5-397B-A17B}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      CRON_SECRET: "${CRON_SECRET}"
      AUTH_TRUST_HOST: "true"
    ports:
      - "3001:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prism-app.rule=Host(`prism.localhost`)"
      - "traefik.http.routers.prism-app.entrypoints=web"
      - "traefik.http.services.prism-app.loadbalancer.server.port=3000"
    networks:
      - prism-network

  prism-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prism-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - prism-network

networks:
  prism-network:
    driver: bridge

volumes:
  prism_db_data:
