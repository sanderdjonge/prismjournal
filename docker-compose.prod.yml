# PrismJournal — Production
# Usage: docker compose -f docker-compose.prod.yml up -d
# External access via Cloudflare Tunnel → http://prod_app:3000 (no host port needed)

name: prism-prod

services:

  db:
    image: postgres:15-alpine
    container_name: prod_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Prod DB was created as prism_journal_prod — override .env which has dev name
      POSTGRES_DB: ${POSTGRES_DB_PROD:-prism_journal_prod}
    volumes:
      - prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_PROD:-prism_journal_prod}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - prod-network

  redis:
    image: redis:7-alpine
    container_name: prod_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - prod_redis_data:/data
    networks:
      - prod-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prod_app
    shm_size: '256m'
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB_PROD:-prism_journal_prod}"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-100}
      RATE_LIMIT_SYNC: ${RATE_LIMIT_SYNC:-600}
      STORAGE_PATH: /app/storage
      BACKUP_PATH: /app/backups
      BACKUP_KEEP_HOURLY: ${BACKUP_KEEP_HOURLY:-24}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-12}
      REDIS_URL: redis://redis:6379
    volumes:
      - prod_storage:/app/storage
      - prod_backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - prod-network

  backup:
    image: postgres:15-alpine
    container_name: prod_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB_PROD:-prism_journal_prod}
      BACKUP_KEEP_HOURLY: ${BACKUP_KEEP_HOURLY:-24}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-12}
    volumes:
      - prod_backups:/backups
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
      - ./scripts/db-backup-entrypoint.sh:/scripts/db-backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/db-backup-entrypoint.sh"]
    networks:
      - prod-network

  cron:
    image: alpine:3.19
    container_name: prod_cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file: .env
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: "http://app:3000"
    volumes:
      - ./scripts/digest-cron-entrypoint.sh:/scripts/digest-cron-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/digest-cron-entrypoint.sh"]
    networks:
      - prod-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prod_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge

volumes:
  prod_db_data:
  prod_storage:
  prod_backups:
  prod_redis_data:
