# Production Environment Configuration
# Usage: docker compose -p prism-prod -f docker-compose.prod.yml up -d
# Note: Traefik removed for local macOS development - app exposed directly via port mapping

name: prism-prod

services:
  db:
    image: postgres:15-alpine
    container_name: prism-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism_password}
      POSTGRES_DB: ${POSTGRES_DB:-prism_journal}
    ports:
      - "5432:5432"
    volumes:
      - prism_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism_user} -d ${POSTGRES_DB:-prism_journal}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - prism-prod-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-prod-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-prism_user}:${POSTGRES_PASSWORD:-prism_password}@db:5432/${POSTGRES_DB:-prism_journal}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-prod-secret-change-me}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://prism.we-share.nl}"
      NEBUL_API_KEY: "${NEBUL_API_KEY}"
      NEBUL_BASE_URL: "${NEBUL_BASE_URL:-https://api.inference.nebul.io/v1}"
      NEBUL_MODEL: "${NEBUL_MODEL:-Qwen/Qwen3.5-397B-A17B}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      CRON_SECRET: "${CRON_SECRET:-prod-cron-secret}"
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    networks:
      - prism-prod-network

  # Cloudflare tunnel for external access
  # Note: Configure tunnel in Cloudflare dashboard to route to http://app:3000
  prism-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prism-prod-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - prism-prod-network

networks:
  prism-prod-network:
    driver: bridge

volumes:
  prism_prod_db_data:
