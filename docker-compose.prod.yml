# PrismJournal — Production
# Usage: docker compose -f docker-compose.prod.yml up -d
# External access via Cloudflare Tunnel → http://prod_app:3000 (no host port needed)

name: prism-prod

services:

  db:
    image: postgres:15-alpine
    container_name: prod_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - prod-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-prod-app
    shm_size: '256m'
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CRON_SECRET: ${CRON_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      NEBUL_API_KEY: ${NEBUL_API_KEY}
      NEBUL_BASE_URL: ${NEBUL_BASE_URL}
      NEBUL_MODEL: ${NEBUL_MODEL}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-100}
      RATE_LIMIT_SYNC: ${RATE_LIMIT_SYNC:-600}
      AUTH_TRUST_HOST: "true"
      STORAGE_PATH: /app/storage
      BACKUP_PATH: /app/backups
      BACKUP_KEEP_HOURLY: ${BACKUP_KEEP_HOURLY:-24}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-12}
    volumes:
      - prod_storage:/app/storage
      - prod_backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - prod-network

  backup:
    image: postgres:15-alpine
    container_name: prod_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PGHOST: prod_db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_KEEP_HOURLY: ${BACKUP_KEEP_HOURLY:-24}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-12}
    volumes:
      - prod_backups:/backups
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
      - ./scripts/db-backup-entrypoint.sh:/scripts/db-backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/db-backup-entrypoint.sh"]
    networks:
      - prod-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prod_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge

volumes:
  prod_db_data:
  prod_storage:
  prod_backups:
