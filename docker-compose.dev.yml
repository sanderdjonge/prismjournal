# Development Environment Configuration
# Usage: docker compose -f docker-compose.dev.yml up -d
# Note: Traefik removed for local macOS development - app exposed directly via port mapping

name: prism-dev

services:
  db:
    image: postgres:15-alpine
    container_name: prism-dev-db
    environment:
      POSTGRES_USER: prism_dev
      POSTGRES_PASSWORD: prism_dev_password
      POSTGRES_DB: prism_journal_dev
    ports:
      - "5433:5432"    # Dev DB on port 5433 to avoid conflict with prod
    volumes:
      - prism_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism_dev -d prism_journal_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prism-dev-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-dev-app
    shm_size: '256m'
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://prism_dev:prism_dev_password@db:5432/prism_journal_dev"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002}
      AUTH_TRUST_HOST: "true"
      RATE_LIMIT_API: "300"
      RATE_LIMIT_SYNC: "2000"
      STORAGE_PATH: "/app/storage"
      BACKUP_PATH: "/app/backups"
      BACKUP_KEEP_HOURLY: "24"
      BACKUP_KEEP_DAILY: "30"
      BACKUP_KEEP_WEEKLY: "12"
    ports:
      - "3002:3000"    # Dev app on port 3002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - prism_dev_storage:/app/storage
      - ./backups:/app/backups
    networks:
      - prism-dev-network

  # Automated database backup — dumps to ./backups/ (host filesystem, survives everything)
  backup:
    image: postgres:15-alpine
    container_name: prism-dev-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: prism_dev
      PGPASSWORD: prism_dev_password
      PGDATABASE: prism_journal_dev
      BACKUP_KEEP_HOURLY: "24"
      BACKUP_KEEP_DAILY: "30"
      BACKUP_KEEP_WEEKLY: "12"
    volumes:
      - ./backups:/backups
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
      - ./scripts/db-backup-entrypoint.sh:/scripts/db-backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/db-backup-entrypoint.sh"]
    networks:
      - prism-dev-network

  # Cloudflare tunnel for secure external access
  prism-dev-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prism-dev-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - prism-dev-network

networks:
  prism-dev-network:
    driver: bridge

volumes:
  prism_dev_db_data:
  prism_dev_storage:
