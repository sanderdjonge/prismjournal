# PrismJournal — Development
# Usage: docker compose -f docker-compose.dev.yml up -d
# App exposed on :3002, Postgres on :5433 (to avoid conflict with prod)

name: prism-dev

services:

  db:
    image: postgres:15-alpine
    container_name: prism-dev-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - prism_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prism-dev-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-dev-app
    shm_size: '256m'
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-300}
      RATE_LIMIT_SYNC: ${RATE_LIMIT_SYNC:-2000}
      STORAGE_PATH: /app/storage
      BACKUP_PATH: /app/backups
      BACKUP_KEEP_HOURLY: ${BACKUP_KEEP_HOURLY:-24}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-12}
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - prism_dev_storage:/app/storage
      - ./backups:/app/backups
    networks:
      - prism-dev-network

  backup:
    image: postgres:15-alpine
    container_name: prism-dev-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_KEEP_HOURLY: ${BACKUP_KEEP_HOURLY:-24}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-12}
    volumes:
      - ./backups:/backups
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
      - ./scripts/db-backup-entrypoint.sh:/scripts/db-backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/db-backup-entrypoint.sh"]
    networks:
      - prism-dev-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: prism-dev-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - prism-dev-network

networks:
  prism-dev-network:
    driver: bridge

volumes:
  prism_dev_db_data:
  prism_dev_storage:
